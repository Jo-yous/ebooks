<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaign Book Tracker — 100 Books 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #ff3d7f;
    --yellow: #ffd93d;
    --purple: #7c4dff;
    --mint: #3ddcb3;
    --cream: #fff8f0;
    --ink: #0e0820;
    --bg: #0a0614;
    --card: rgba(255,255,255,0.035);
    --card-hover: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.08);
    --border-bright: rgba(255,255,255,0.15);
    --muted: rgba(255,248,240,0.45);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    font-family: 'Outfit', sans-serif;
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 60% 50% at 80% -10%, rgba(124,77,255,.18) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at -10% 80%, rgba(255,61,127,.1) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(61,220,179,.05) 0%, transparent 70%);
  }

  /* ── Hero Header ── */
  .hero {
    position: relative; z-index: 1;
    padding: clamp(32px,5vw,64px) clamp(20px,6vw,80px) clamp(24px,4vw,48px);
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(124,77,255,.06) 0%, transparent 100%);
  }
  .hero-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 24px; }

  .hero-left { display: flex; flex-direction: column; gap: 10px; }

  .live-pill {
    display: inline-flex; align-items: center; gap: 8px; align-self: flex-start;
    background: rgba(255,217,61,.08); border: 1px solid rgba(255,217,61,.22);
    color: var(--yellow); font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: 11px; letter-spacing: .16em; text-transform: uppercase;
    padding: 6px 14px; border-radius: 100px;
    box-shadow: 0 2px 12px rgba(255,217,61,.1);
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--mint); box-shadow: 0 0 8px var(--mint);
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.7)} }

  .hero h1 {
    font-family: 'Syne', sans-serif; font-weight: 900;
    font-size: clamp(28px,5vw,52px); line-height: 1;
    letter-spacing: -.02em;
  }
  .hero h1 .accent { color: var(--yellow); }
  .hero-sub { font-size: 14px; color: var(--muted); margin-top: 2px; }

  /* ── Stats ── */
  .stats { display: flex; gap: 12px; flex-wrap: wrap; }
  .stat {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 14px 24px; text-align: center;
    min-width: 100px; backdrop-filter: blur(10px);
    transition: border-color .2s, transform .2s;
  }
  .stat:hover { border-color: var(--border-bright); transform: translateY(-2px); }
  .stat-num {
    font-family: 'Syne', sans-serif; font-weight: 900;
    font-size: 28px; color: var(--yellow);
    transition: all .4s ease;
  }
  .stat:nth-child(2) .stat-num { color: var(--mint); }
  .stat:nth-child(3) .stat-num { color: var(--pink); }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin-top: 4px; font-weight: 600; }

  /* ── Progress bar (claimed %) ── */
  .claim-progress {
    max-width: 1200px; margin: 0 auto;
    padding: 16px clamp(20px,6vw,80px) 0;
    position: relative; z-index: 1;
  }
  .claim-progress-bar {
    height: 4px; background: var(--border); border-radius: 100px; overflow: hidden;
  }
  .claim-progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--purple), var(--mint));
    border-radius: 100px; transition: width .8s cubic-bezier(.4,0,.2,1);
  }
  .claim-progress-label {
    font-size: 11px; color: var(--muted); text-align: right; margin-top: 6px; font-weight: 600;
  }

  /* ── Sticky Toolbar ── */
  .toolbar-wrap {
    position: sticky; top: 0; z-index: 10;
    background: rgba(10,6,20,.85); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 14px clamp(20px,6vw,80px);
  }
  .toolbar-inner { max-width: 1200px; margin: 0 auto; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap input {
    width: 100%; padding: 11px 18px 11px 44px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; color: var(--cream);
    font-family: 'Outfit', sans-serif; font-size: 14px; outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus { border-color: rgba(255,217,61,.4); box-shadow: 0 0 0 3px rgba(255,217,61,.08); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn {
    padding: 8px 16px; border-radius: 100px; border: 1px solid var(--border);
    background: transparent; color: var(--cream);
    font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 12px;
    cursor: pointer; transition: all .2s; white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--border-bright); background: var(--card-hover); }
  .filter-btn.active { background: var(--yellow); color: var(--ink); border-color: var(--yellow); box-shadow: 0 4px 12px rgba(255,217,61,.3); }

  /* ── Main Grid ── */
  .main { max-width: 1200px; margin: 0 auto; padding: clamp(24px,4vw,40px) clamp(20px,6vw,80px); position: relative; z-index: 1; }

  /* ── Sample Banner ── */
  .sample-banner {
    display: none; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
    background: rgba(255,217,61,.06); border: 1px solid rgba(255,217,61,.2);
    border-radius: 16px; padding: 16px 22px; margin-bottom: 28px;
  }
  .sample-banner p { font-size: 14px; font-weight: 600; color: var(--muted); }
  .sample-banner p span { color: var(--yellow); }
  .sample-link {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--yellow); color: var(--ink);
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 13px;
    padding: 9px 18px; border-radius: 10px; text-decoration: none; white-space: nowrap;
    transition: all .15s; box-shadow: 0 4px 14px rgba(255,217,61,.25);
  }
  .sample-link:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,217,61,.35); }

  /* ── Books Grid ── */
  .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }

  .book-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 22px;
    display: flex; flex-direction: column; gap: 14px;
    transition: all .25s cubic-bezier(.4,0,.2,1);
    position: relative; overflow: hidden;
    animation: fadeUp .4s ease both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .book-card::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.02) 0%, transparent 60%);
    pointer-events: none;
  }
  .book-card:hover { border-color: var(--border-bright); transform: translateY(-3px); box-shadow: 0 20px 40px rgba(0,0,0,.3); background: var(--card-hover); }
  .book-card.claimed { border-color: rgba(61,220,179,.3); }
  .book-card.claimed::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--mint), var(--purple)); }

  .book-top { display: flex; align-items: flex-start; gap: 14px; }
  .rank-badge {
    min-width: 38px; height: 38px; border-radius: 10px;
    background: rgba(255,217,61,.08); border: 1px solid rgba(255,217,61,.2);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-weight: 900; font-size: 13px;
    color: var(--yellow); flex-shrink: 0;
  }
  .book-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; line-height: 1.35; color: var(--cream); }
  .book-title-link {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; line-height: 1.35;
    color: var(--yellow); text-decoration: none;
    transition: opacity .2s;
  }
  .book-title-link:hover { opacity: .8; text-decoration: underline; }
  .book-desc { font-size: 13px; line-height: 1.6; color: var(--muted); }

  .book-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .meta-tag { padding: 4px 12px; border-radius: 100px; font-size: 11px; font-weight: 700; letter-spacing: .04em; }
  .meta-category { background: rgba(124,77,255,.15); color: #c4b0ff; border: 1px solid rgba(124,77,255,.25); }
  .meta-pages { background: rgba(255,217,61,.08); color: var(--yellow); border: 1px solid rgba(255,217,61,.2); }

  /* ── Claim ── */
  .claim-area { margin-top: auto; }
  .claimed-badge {
    display: flex; align-items: center; gap: 10px;
    background: rgba(61,220,179,.07); border: 1px solid rgba(61,220,179,.25);
    border-radius: 12px; padding: 11px 16px;
    font-weight: 700; font-size: 13px; color: var(--mint);
  }
  .claimed-badge-icon { font-size: 16px; }
  .claim-form { display: flex; gap: 8px; }
  .claim-form input {
    flex: 1; padding: 10px 14px;
    background: rgba(255,255,255,.05); border: 1px solid var(--border);
    border-radius: 10px; color: var(--cream);
    font-family: 'Outfit', sans-serif; font-size: 13px; outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .claim-form input::placeholder { color: var(--muted); }
  .claim-form input:focus { border-color: rgba(255,217,61,.5); box-shadow: 0 0 0 3px rgba(255,217,61,.08); }
  .claim-btn {
    padding: 10px 18px; border-radius: 10px; border: none;
    background: var(--yellow); color: var(--ink);
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 13px;
    cursor: pointer; white-space: nowrap;
    transition: all .2s; box-shadow: 0 4px 12px rgba(255,217,61,.2);
  }
  .claim-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(255,217,61,.35); }
  .claim-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ── States ── */
  .loading-state {
    grid-column: 1/-1; text-align: center; padding: 100px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .spinner {
    width: 44px; height: 44px;
    border: 3px solid var(--border); border-top-color: var(--yellow);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .no-results { grid-column: 1/-1; text-align: center; padding: 80px; color: var(--muted); font-size: 15px; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(14,8,32,.95); border: 1px solid var(--border);
    padding: 13px 24px; border-radius: 14px;
    font-weight: 600; font-size: 14px;
    box-shadow: 0 24px 48px rgba(0,0,0,.5);
    transition: transform .35s cubic-bezier(.4,0,.2,1);
    z-index: 999; white-space: nowrap;
    backdrop-filter: blur(12px);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: rgba(61,220,179,.4); color: var(--mint); }
  .toast.error { border-color: rgba(255,61,127,.4); color: var(--pink); }

  @media (max-width: 600px) {
    .claim-form { flex-direction: column; }
    .toolbar-inner { flex-direction: column; align-items: stretch; }
  }
</style>
</head>
<body>

<!-- Hero -->
<header class="hero">
  <div class="hero-inner">
    <div class="hero-left">
      <span class="live-pill"><span class="live-dot"></span>Writers Only</span>
      <h1>📚 Campaign <span class="accent">Book Tracker</span></h1>
      <p class="hero-sub">100 Books 2026 — Find a book and claim it to get started</p>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="total-count">—</div>
        <div class="stat-label">Total Books</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="available-count">—</div>
        <div class="stat-label">Available</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="claimed-count">—</div>
        <div class="stat-label">Claimed</div>
      </div>
    </div>
  </div>
  <div class="claim-progress">
    <div class="claim-progress-bar"><div class="claim-progress-fill" id="claim-fill"></div></div>
    <div class="claim-progress-label" id="claim-pct">Loading…</div>
  </div>
</header>

<!-- Sticky toolbar -->
<div class="toolbar-wrap">
  <div class="toolbar-inner">
    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Search by title, category, description…" oninput="filterBooks()">
    </div>
    <div class="filters" id="filters"></div>
  </div>
</div>

<!-- Books -->
<main class="main">
  <div class="sample-banner" id="sample-banner">
    <p>📄 Not sure what's expected? <span>Check the sample PDF first.</span></p>
    <a class="sample-link" id="sample-link" href="#" target="_blank" rel="noopener">📥 View Sample PDF</a>
  </div>
  <div class="books-grid" id="books-container">
    <div class="loading-state"><div class="spinner"></div><p style="color:var(--muted)">Loading books…</p></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  const API = "https://script.google.com/macros/s/AKfycbzga-RlBCi3Yo2-zMUlNY2Saf0zlsg9IVrnze9nrvMFjLh5nJxOu_qnDNoZZzU8zQWKiQ/exec";
  let allBooks = [];
  let activeFilter = "All";
  let samplePdf = "";

  async function loadBooks() {
    try {
      const res = await fetch(API);
      const data = await res.json();
      allBooks = data.books || data;
      samplePdf = data.samplePdf || "";
      if (samplePdf) {
        document.getElementById('sample-banner').style.display = 'flex';
        document.getElementById('sample-link').href = samplePdf;
      }
      buildFilters(); updateStats(); renderBooks();
    } catch {
      document.getElementById('books-container').innerHTML = `<div class="no-results">⚠️ Could not load books. Please refresh.</div>`;
    }
  }

  function buildFilters() {
    const cats = ["All", ...new Set(allBooks.map(b => b.category).filter(Boolean))];
    document.getElementById('filters').innerHTML = cats.map((c, i) =>
      `<button class="filter-btn ${i===0?'active':''}" onclick="setFilter('${c}', this)">${c}</button>`
    ).join('');
  }

  function setFilter(cat, el) {
    activeFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active'); filterBooks();
  }

  function filterBooks() {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = allBooks.filter(b => {
      const matchCat = activeFilter === 'All' || b.category === activeFilter;
      const matchQ = !q || [b.title, b.category, b.description].some(v => v?.toLowerCase().includes(q));
      return matchCat && matchQ;
    });
    renderBooks(filtered);
  }

  function updateStats() {
    const claimed = allBooks.filter(b => b.claimedBy?.trim()).length;
    const total   = allBooks.length;
    const avail   = total - claimed;
    document.getElementById('total-count').textContent     = total;
    document.getElementById('available-count').textContent = avail;
    document.getElementById('claimed-count').textContent   = claimed;
    const pct = total ? Math.round((claimed / total) * 100) : 0;
    document.getElementById('claim-fill').style.width = pct + '%';
    document.getElementById('claim-pct').textContent = `${pct}% claimed — ${avail} books still available`;
  }

  function renderBooks(books = allBooks) {
    const c = document.getElementById('books-container');
    if (!books.length) { c.innerHTML = `<div class="no-results">No books match your search.</div>`; return; }
    c.innerHTML = books.map((b, i) => bookCard(b, i)).join('');
  }

  function bookCard(b, idx) {
    const isClaimed = b.claimedBy?.trim();
    const titleHtml = b.titleLink
      ? `<a class="book-title-link" href="${b.titleLink}" target="_blank" rel="noopener">${b.title} <span style="font-size:10px;opacity:.5">↗</span></a>`
      : `<div class="book-title">${b.title}</div>`;
    return `
      <div class="book-card ${isClaimed ? 'claimed' : ''}" id="card-${b.rank}" style="animation-delay:${Math.min(idx,10)*40}ms">
        <div class="book-top">
          <div class="rank-badge">#${b.rank}</div>
          ${titleHtml}
        </div>
        ${b.description ? `<p class="book-desc">${b.description}</p>` : ''}
        <div class="book-meta">
          ${b.category ? `<span class="meta-tag meta-category">${b.category}</span>` : ''}
          ${b.pages ? `<span class="meta-tag meta-pages">📄 ${b.pages} pages</span>` : ''}
        </div>
        <div class="claim-area">
          ${isClaimed
            ? `<div class="claimed-badge"><span class="claimed-badge-icon">✅</span> Claimed by <strong>${b.claimedBy}</strong></div>`
            : `<div class="claim-form">
                <input type="text" id="name-${b.rank}" placeholder="Your name to claim" maxlength="50">
                <button class="claim-btn" onclick="claimBook(${b.rank}, '${b.title.replace(/'/g,"\\'")}')">✋ Claim</button>
               </div>`}
        </div>
      </div>`;
  }

  async function claimBook(rank, title) {
    const input = document.getElementById(`name-${rank}`);
    const name = input?.value?.trim();
    if (!name) { showToast('Enter your name first!', 'error'); input.focus(); return; }
    const btn = input.closest('.claim-form').querySelector('.claim-btn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const res = await fetch(API, {
        method: 'POST',
        body: JSON.stringify({ action: 'claim', rank, name })
      });
      const result = await res.json();
      if (!result.success) throw new Error(result.message || 'Failed to claim');
      const book = allBooks.find(b => String(b.rank) === String(rank));
      if (book) book.claimedBy = name;
      updateStats(); filterBooks();
      showToast(`✅ "${title}" claimed by ${name}!`, 'success');
    } catch (err) {
      showToast('Could not claim: ' + err.message, 'error');
      btn.disabled = false; btn.textContent = '✋ Claim';
    }
  }

  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  loadBooks();
  setInterval(loadBooks, 60000);
</script>
</body>
</html>
