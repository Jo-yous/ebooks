name: Deploy to AlwaysData via FTP

on:
  push:
    branches:
      - main # This workflow will run every time you push to the 'main' branch

jobs:
  web-deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetches all history for all tags and branches (needed for FTP-Deploy-Action)
    
    - name: 📂 Sync files via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # The target directory on AlwaysData. For example, /www/books-project/
        # Make sure to include the trailing slash!
        server-dir: ${{ secrets.FTP_SERVER_DIR }}
